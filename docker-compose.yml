services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  webapi:
    build:
      context: .
      dockerfile: source/WebApi/Dockerfile
    ports:
      - "5000:80"
    volumes:
      - dataprotection_keys:/data/dataprotection-keys
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:80"
      METRICS_API_KEY: ${METRICS_API_KEY}
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Trust Server Certificate=true;"
      Redis__Connection: "${REDIS_CONNECTION}"
      RabbitMQ__Connection: "${RABBITMQ_CONNECTION}"
      RabbitMQ__EmailQueue: "${RABBITMQ_EMAIL_QUEUE}"
      JwtSettings__Secret: "${JWT_SETTINGS_SECRET}"
      JwtSettings__Issuer: "${JWT_SETTINGS_ISSUER}"
      JwtSettings__Audience: "${JWT_SETTINGS_AUDIENCE}"
      JwtSettings__ExpirationMinutes: "${JWT_SETTINGS_EXPIRATIONMINUTES}"
      AppSettings__ProjectName: "${APP_SETTINGS__ProjectName}"
      AppSettings__ProjectOwner: "${APP_SETTINGS__ProjectOwner}"
      AppSettings__BaseUrl: "${APP_SETTINGS__BASEURL}"
      AppSettings__EmailCooldownSeconds: "${APP_SETTINGS__EMAILCOOLDOWNSECONDS}"
      AppSettings__InterfaceUrl: "${APP_SETTINGS__INTERFACEURL}"
      Email__Server: "${EMAIL_SERVER}"
      Email__Port: "${EMAIL_PORT}"
      Email__Username: "${EMAIL_USERNAME}"
      Email__Password: "${EMAIL_PASSWORD}"
      Email__EnableSsl: "${EMAIL_ENABLESSL}"
      Loki__Url: "${Loki__Url}"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      loki:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
    environment:
      METRICS_API_KEY: ${METRICS_API_KEY}
    entrypoint: ["/bin/sh", "-c", "sed \"s/@@METRICS_API_KEY@@/${METRICS_API_KEY}/g\" /etc/prometheus/prometheus.yml > /etc/prometheus/prometheus.rendered.yml && exec /bin/prometheus --config.file=/etc/prometheus/prometheus.rendered.yml"]
    ports:
      - "9090:9090"
    depends_on:
      - webapi

  grafana:
    image: grafana/grafana-oss:9.5.6
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
  grafana-init:
    image: python:3.11-alpine
    environment:
      - GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GRAFANA_DASHBOARD_UID=webapi-http-requests
    volumes:
      - ./monitoring/grafana/init:/opt/init
    depends_on:
      - grafana
    entrypoint: ["python", "/opt/init/set-home.py"]

  redisinsight:
    image: redislabs/redisinsight
    ports:
      - "8001:8001"
    environment:
      REDIS_HOST: redis
      RI_APP_PORT: 8001
    depends_on:
      - redis

  rabbitmq:
    image: rabbitmq:management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASS}"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  loki_data:
  dataprotection_keys:
