global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'webapi'
    scrape_interval: 15s
    # Prometheus will include the API key as a query parameter when scraping /metrics.
    # The placeholder below will be replaced at container start with the
    # environment variable `METRICS_API_KEY` provided by Docker Compose.
    params:
      api_key: ['metrics-api-key-CHANGE_ME']
    static_configs:
      - targets: ['webapi:80']

  - job_name: 'prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['prometheus:9090']
